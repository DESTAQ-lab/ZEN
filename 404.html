<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 | DestaQ</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #0D1117;
            --accent-pink: #FF4D8F;
            --accent-gold: #F5C542;
            --accent-purple: #B533FF;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-dark);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container-404 {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .title-404 {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(10rem, 25vw, 18rem);
            line-height: 1;
            margin: 0;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px rgba(181, 51, 255, 0.3);
            animation: float 6s ease-in-out infinite;
        }

        .subtitle-404 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4rem;
            font-weight: 300;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3.5rem;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: white;
            background: var(--accent-gold);
            text-decoration: none;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(245, 197, 66, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            z-index: 1;
        }

        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(245, 197, 66, 0.3);
            background: #ffcf54;
        }

        /* Pure CSS Ripple Effect */
        .btn-home::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
            z-index: -1;
        }

        .btn-home:hover::after {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            transition: 0s;
        }
        
        .btn-home:active::after {
            transform: translate(-50%, -50%) scale(1.1);
            opacity: 0;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
        }

        /* Pure CSS 3D Polygons Background */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            perspective: 1200px;
        }

        .shape {
            position: absolute;
            animation: float-shape 15s linear infinite;
        }

        .shape-1 {
            width: 80px;
            height: 80px;
            border: 2px solid var(--accent-purple);
            top: 20%;
            left: 15%;
            animation-duration: 25s;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 0;
            height: 0;
            border-left: 45px solid transparent;
            border-right: 45px solid transparent;
            border-bottom: 80px solid var(--accent-pink);
            top: 70%;
            right: 15%;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 60px;
            height: 60px;
            background: transparent;
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            bottom: 20%;
            left: 25%;
            animation-duration: 22s;
            animation-delay: -12s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        @keyframes float-shape {
            0% {
                transform: translateY(10vh) rotate(0deg) rotateX(0deg) rotateY(0deg);
                opacity: 0.05;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg) rotateX(180deg) rotateY(180deg);
                opacity: 0.05;
            }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container-404">
        <h1 class="title-404">404</h1>
        <p class="subtitle-404">Essa página foi para o metaverso.</p>
        <a href="/index.html" class="btn-home">VOLTAR PARA O INÍCIO</a>
    </div>
</body>
</html>
