[build]
  publish = "."
  command = "echo 'Static site'"

[[redirects]]
  from = "/produtos"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/comunidade"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/network"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/plataformas"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
